<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión - Empleos SERVIR</title>
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="auth-container">
    <div class="auth-card">
      <h2>Iniciar sesión</h2>
      <form id="login-form" class="auth-form">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" required autocomplete="username" />
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" />
        <button type="submit" class="btn-primary">Ingresar</button>
      </form>
      <div class="auth-divider">o</div>
      <button id="google-login" class="btn-google">Iniciar con Google</button>
      <button id="outlook-login" class="btn-outlook">Iniciar con Outlook</button>
      <p class="auth-link">¿No tienes cuenta? <a href="register.html">Regístrate</a></p>
      <p class="auth-link"><a href="/static/index.html">&larr; Volver a consulta pública</a></p>
    </div>
  </main>
  <script src="login.js"></script>
</body>
</html>
