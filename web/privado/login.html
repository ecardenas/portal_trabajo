<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión - Empleos SERVIR</title>
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-tabs">
        <span class="tab-active"><span class="tab-icon">&#128274;</span> Iniciar sesión</span>
        <a href="register.html" class="tab-inactive"><span class="tab-icon">&#128100;</span> Registrarse</a>
      </div>
      <div class="register-avatar">
        <img src="/static/img/user_off.png" alt="Avatar" width="60" height="60" />
      </div>
      <form id="login-form" class="auth-form compact-form">
        <div class="input-group">
          <span class="input-icon">&#128100;</span>
          <input type="text" id="username" name="username" required placeholder="Usuario o e-mail" autocomplete="username" />
        </div>
        <div class="input-group">
          <span class="input-icon">&#128274;</span>
          <input type="password" id="password" name="password" required placeholder="Contraseña" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-primary btn-block">Ingresar</button>
      </form>
      <div class="auth-links-row">
        <a href="/static/index.html">&larr; Consulta pública</a>
        <a href="register.html">¿No tienes cuenta? Regístrate</a>
      </div>
    </div>
  </main>
  <script src="login.js"></script>
</body>
</html>
