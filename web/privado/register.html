  <!-- Modal de confirmación -->
  <div id="modalRegistro" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>¡Registro exitoso!</h3>
      <p>Ahora puedes iniciar sesión.</p>
      <button id="btnIrLogin" class="btn-primary" style="width:100%;margin-top:18px;">Volver al inicio de sesión</button>
    </div>
  </div>
<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro - Empleos SERVIR</title>
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-tabs">
        <a href="login.html" class="tab-inactive"><span class="tab-icon">&#128274;</span> Iniciar sesión</a>
        <span class="tab-active"><span class="tab-icon">&#128100;</span> Registrarse</span>
      </div>
      <div class="register-avatar">
        <img src="/static/img/user_off.png" alt="Avatar" width="60" height="60" />
      </div>
      <form id="register-form" class="auth-form compact-form">
        <div class="input-group">
          <span class="input-icon">&#128100;</span>
          <input type="text" id="username" name="username" required pattern="[A-Za-z0-9_.-]{3,32}" placeholder="Usuario o e-mail" autocomplete="username" />
        </div>
        <div class="input-group">
          <span class="input-icon">&#128241;</span>
          <input type="tel" id="celular" name="celular" required pattern="9[0-9]{8}" maxlength="9" placeholder="Celular" autocomplete="tel" />
        </div>
        <div class="input-group">
          <span class="input-icon">&#128274;</span>
          <input type="password" id="password" name="password" required placeholder="Contraseña" autocomplete="new-password" />
        </div>
        <div class="input-group">
          <span class="input-icon">&#128274;</span>
          <input type="password" id="password2" name="password2" required placeholder="Confirmar contraseña" autocomplete="new-password" />
        </div>
        <button type="submit" class="btn-primary btn-block">Registrarme</button>
      </form>
      <div class="auth-links-row">
        <a href="/static/index.html">&larr; Consulta pública</a>
        <a href="login.html">¿Ya tienes cuenta? Inicia sesión</a>
      </div>
    </div>
  </main>
  <script src="register.js"></script>
</body>
</html>
